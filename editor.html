<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Редактор запрошення</title>
  <!-- Set before the preview iframe begins loading so index.html knows the
       editor drives rendering and does not self-render from content.json. -->
  <script>window.__WEDDING_EDITOR__ = true;</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --b:#e4dfd6; --ink:#1a1a1a; --muted:#6b6b6b; --accent:#c2a878; --bg:#faf8f4; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Inter",system-ui,sans-serif; color:var(--ink); background:#f1eee8; }
    .ed-bar { display:flex; align-items:center; justify-content:space-between; gap:1rem;
      padding:.7rem 1rem; background:var(--ink); color:#fff; position:sticky; top:0; z-index:5; flex-wrap:wrap; }
    .ed-bar strong { letter-spacing:.05em; }
    .ed-actions { display:flex; gap:.5rem; flex-wrap:wrap; }
    .ed-bar button { font:inherit; font-size:.8rem; padding:.5rem .85rem; border:1px solid #555;
      background:#222; color:#fff; border-radius:4px; cursor:pointer; }
    .ed-bar button.primary { background:var(--accent); border-color:var(--accent); color:#1a1a1a; font-weight:600; }
    .ed-bar button:hover { filter:brightness(1.1); }
    .ed-event { display:flex; gap:.5rem; align-items:center; }
    .ed-event input { font:inherit; font-size:.8rem; padding:.45rem .6rem; border:1px solid #555; border-radius:4px; background:#222; color:#fff; min-width:210px; }
    .ed-main { display:grid; grid-template-columns:minmax(320px,440px) 1fr; height:calc(100vh - 52px); }
    @media (max-width:880px){ .ed-main{ grid-template-columns:1fr; height:auto; } }
    .ed-form { overflow-y:auto; padding:1.25rem 1.25rem 4rem; background:#fff; border-right:1px solid var(--b); }
    fieldset { border:1px solid var(--b); border-radius:8px; margin:0 0 1.1rem; padding:.9rem 1rem 1.1rem; }
    legend { font-weight:600; font-size:.95rem; padding:0 .4rem; display:flex; align-items:center; gap:.5rem; }
    legend .toggle { font-size:.7rem; font-weight:400; color:var(--muted); display:inline-flex; align-items:center; gap:.3rem; }
    label.f { display:block; margin:.65rem 0 0; font-size:.78rem; color:var(--muted); }
    label.f input[type=text], label.f input[type=datetime-local], label.f input[type=url],
    label.f textarea, label.f select {
      width:100%; margin-top:.25rem; padding:.5rem .6rem; font:inherit; font-size:.88rem;
      border:1px solid var(--b); border-radius:5px; background:#fff; color:var(--ink); }
    label.f textarea { min-height:64px; resize:vertical; }
    .row { border:1px dashed var(--b); border-radius:6px; padding:.6rem .7rem; margin-top:.6rem; position:relative; background:#fcfbf9; }
    .row .rm { position:absolute; top:.4rem; right:.4rem; border:0; background:transparent; color:#b3261e; cursor:pointer; font-size:1rem; }
    .add { margin-top:.6rem; font:inherit; font-size:.8rem; padding:.45rem .8rem; border:1px solid var(--accent);
      background:#fff; color:#1a1a1a; border-radius:5px; cursor:pointer; }
    .add:hover { background:var(--accent); }
    .inline { display:flex; gap:.5rem; }
    .inline > * { flex:1; }
    .swrow { display:flex; gap:.5rem; align-items:flex-end; }
    .swrow input[type=color]{ width:42px; height:38px; padding:0; border:1px solid var(--b); border-radius:5px; background:#fff; }
    .ed-preview { display:flex; flex-direction:column; min-width:0; }
    .ed-ptools { display:flex; gap:.5rem; padding:.5rem .75rem; background:#e7e2da; border-bottom:1px solid var(--b); }
    .ed-ptools button { font:inherit; font-size:.75rem; padding:.35rem .7rem; border:1px solid #c9c3b8; background:#fff; border-radius:4px; cursor:pointer; }
    .ed-ptools button.on { background:var(--ink); color:#fff; border-color:var(--ink); }
    .ed-frame-wrap { flex:1; overflow:auto; display:flex; justify-content:center; background:#d9d3c9; padding:1rem; }
    #preview { width:100%; height:100%; border:0; background:#fff; box-shadow:0 6px 30px rgba(0,0,0,.15); }
    .ed-frame-wrap.mobile #preview { width:390px; height:760px; }
    .hint { font-size:.72rem; color:var(--muted); margin:.3rem 0 0; }
  </style>
</head>
<body>
  <header class="ed-bar">
    <strong>Редактор запрошення</strong>
    <div class="ed-event">
      <input id="slug" type="text" placeholder="slug події (напр. mykhailo-olena)">
      <button data-act="load">Завантажити подію</button>
    </div>
    <div class="ed-actions">
      <input type="file" id="import" accept="application/json,.json" hidden>
      <button data-act="import">Імпорт JSON</button>
      <button data-act="copy">Скопіювати JSON</button>
      <button data-act="reset">Скинути до прикладу</button>
      <button data-act="download" class="primary">Завантажити content.json</button>
    </div>
  </header>

  <div class="ed-main">
    <form id="ed-form" class="ed-form" autocomplete="off"></form>
    <div class="ed-preview">
      <div class="ed-ptools">
        <button data-view="desktop" class="on">Десктоп</button>
        <button data-view="mobile">Мобайл</button>
        <button data-act="reload">Оновити превʼю</button>
        <span class="hint" style="margin-left:auto">Зміни застосовуються автоматично</span>
      </div>
      <div class="ed-frame-wrap" id="frameWrap">
        <iframe id="preview" src="/" title="Превʼю запрошення"></iframe>
      </div>
    </div>
  </div>

  <script src="/js/editor.js?v=4"></script>
</body>
</html>
