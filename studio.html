<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Студія Вісточка</title>
  <!-- Preview iframe (/) must wait for Studio to inject content. -->
  <script>window.__WEDDING_EDITOR__ = true;</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --b:#e4dfd6; --ink:#1a1a1a; --muted:#6b6b6b; --accent:#c2a878; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Inter",system-ui,sans-serif; color:var(--ink); background:#f1eee8; height:100vh; display:flex; flex-direction:column; }
    .bar { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; padding:.6rem 1rem; background:#1b1c1a; color:#fff; }
    .bar strong { letter-spacing:.04em; margin-right:.4rem; }
    .bar .proj { font-size:.78rem; color:#bdbab4; }
    .bar .sp { flex:1; }
    .bar button, .bar select { font:inherit; font-size:.8rem; padding:.45rem .7rem; border:1px solid #555; background:#262625; color:#fff; border-radius:5px; cursor:pointer; }
    .bar button.primary { background:var(--accent); border-color:var(--accent); color:#1b1c1a; font-weight:600; }
    .bar button:hover { filter:brightness(1.12); }
    .bar button:disabled { opacity:.4; cursor:default; }
    .main { flex:1; display:grid; grid-template-columns: minmax(340px,460px) 1fr; min-height:0; }
    @media (max-width:880px){ .main{ grid-template-columns:1fr; } }
    .left { display:flex; flex-direction:column; min-height:0; background:#fff; border-right:1px solid var(--b); }
    .tabs { display:flex; gap:.25rem; padding:.5rem .5rem 0; border-bottom:1px solid var(--b); }
    .tabs button { font:inherit; font-size:.82rem; padding:.5rem .9rem; border:0; background:none; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
    .tabs button.on { color:var(--ink); border-bottom-color:var(--accent); font-weight:600; }
    .panel { overflow-y:auto; padding:1rem 1.1rem 4rem; flex:1; }
    .preview { display:flex; flex-direction:column; min-width:0; background:#d9d3c9; }
    .ptools { display:flex; gap:.5rem; padding:.5rem .75rem; background:#e7e2da; border-bottom:1px solid var(--b); align-items:center; }
    .ptools button { font:inherit; font-size:.75rem; padding:.35rem .7rem; border:1px solid #c9c3b8; background:#fff; border-radius:4px; cursor:pointer; }
    .ptools button.on { background:#1b1c1a; color:#fff; border-color:#1b1c1a; }
    .frame-wrap { flex:1; overflow:auto; display:flex; justify-content:center; padding:1rem; }
    #pv { width:100%; height:100%; border:0; background:#fff; box-shadow:0 6px 30px rgba(0,0,0,.15); }
    .frame-wrap.mobile #pv { width:390px; height:760px; }

    fieldset { border:1px solid var(--b); border-radius:8px; margin:0 0 1rem; padding:.8rem 1rem 1rem; }
    legend { font-weight:600; font-size:.92rem; padding:0 .4rem; display:flex; align-items:center; gap:.5rem; }
    legend .tg { font-size:.7rem; font-weight:400; color:var(--muted); display:inline-flex; align-items:center; gap:.3rem; }
    label.f { display:block; margin:.6rem 0 0; font-size:.76rem; color:var(--muted); }
    label.f input[type=text], label.f input[type=url], label.f textarea, label.f select {
      width:100%; margin-top:.25rem; padding:.5rem .6rem; font:inherit; font-size:.88rem; border:1px solid var(--b); border-radius:5px; background:#fff; color:var(--ink); }
    label.f textarea { min-height:64px; resize:vertical; }
    .row { border:1px dashed var(--b); border-radius:6px; padding:.6rem .7rem; margin-top:.6rem; position:relative; background:#fcfbf9; }
    .row .rm { position:absolute; top:.35rem; right:.4rem; border:0; background:none; color:#b3261e; cursor:pointer; font-size:1rem; }
    .add { margin-top:.6rem; font:inherit; font-size:.8rem; padding:.45rem .8rem; border:1px solid var(--accent); background:#fff; border-radius:5px; cursor:pointer; }
    .add:hover { background:var(--accent); }
    .swrow { display:flex; gap:.5rem; align-items:center; }
    .swrow input[type=color]{ width:42px; height:34px; padding:0; border:1px solid var(--b); border-radius:5px; background:#fff; }
    .photo { display:flex; gap:.7rem; align-items:center; border:1px solid var(--b); border-radius:8px; padding:.6rem; margin-top:.6rem; }
    .photo img { width:64px; height:64px; object-fit:cover; border-radius:5px; background:#eee; border:1px solid var(--b); }
    .photo .meta { flex:1; min-width:0; }
    .photo .meta b { font-size:.85rem; }
    .photo .meta div { font-size:.72rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .hint { font-size:.74rem; color:var(--muted); margin:.4rem 0; }
    .design-color { display:flex; align-items:center; gap:.6rem; margin-top:.55rem; }
    .design-color span { font-size:.8rem; flex:1; }
    .empty { padding:2rem 1rem; text-align:center; color:var(--muted); }
    .empty button { margin-top:1rem; }
    .toast { position:fixed; left:50%; bottom:1.3rem; transform:translateX(-50%); background:#1b1c1a; color:#fff; padding:.6rem 1rem; border-radius:6px; font-size:.85rem; z-index:99; box-shadow:0 6px 24px rgba(0,0,0,.25); }
  </style>
</head>
<body>
  <header class="bar">
    <strong>Студія Вісточка</strong>
    <button id="open" class="primary">Відкрити проєкт</button>
    <span class="proj" id="proj"></span>
    <span class="sp"></span>
    <select id="events" title="Подія" disabled></select>
    <button id="newEvent" disabled>+ Подія</button>
    <button id="delEvent" disabled>Видалити</button>
    <button id="save" disabled>Зберегти подію</button>
    <button id="build" disabled>Зібрати publish</button>
  </header>

  <div class="main">
    <div class="left">
      <nav class="tabs">
        <button data-tab="content" class="on">Контент</button>
        <button data-tab="photos">Фото</button>
        <button data-tab="design">Дизайн</button>
        <button data-tab="site">Головна</button>
        <button data-tab="publish">Публікація</button>
      </nav>
      <div class="panel" id="panel">
        <div class="empty">
          <p>Натисніть «Відкрити проєкт» і виберіть теку<br><code>wedding-invitation</code> на диску.</p>
          <p class="hint">Працює в Chrome / Edge. Студія читає й пише файли прямо в цю теку.</p>
        </div>
      </div>
    </div>
    <div class="preview">
      <div class="ptools">
        <button data-view="desktop" class="on">Десктоп</button>
        <button data-view="mobile">Мобайл</button>
        <span class="hint" style="margin-left:auto">Превʼю</span>
      </div>
      <div class="frame-wrap" id="frameWrap"><iframe id="pv" src="/" title="Превʼю"></iframe></div>
    </div>
  </div>

  <script src="/js/studio.js?v=4"></script>
</body>
</html>
